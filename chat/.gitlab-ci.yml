workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
#    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
#    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
#    - if: ($CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_BRANCH == "develop") && $MY_VARIABLE

variables:
  VERSION: "1.0"

stages:          # List of stages for jobs, and their order of execution
  - package
  - docker-build
  - deployment


package-job:
  stage: package
  image:
    name: maven:3.9.5-eclipse-temurin-21
    pull_policy: if-not-present
  script:
    - mvn clean package -Dmaven.test.skip=true
  artifacts:
    paths:
      - target/*.jar


docker-build-job:
  stage: docker-build
  needs:
    - package-job
  variables:
    DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  image:
    name: docker
    pull_policy: if-not-present
  services:
    - name: docker:dind
      pull_policy: if-not-present
  before_script:
    - docker info
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker build --pull -t "$DOCKER_IMAGE_NAME" .
    - docker push "$DOCKER_IMAGE_NAME"
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        docker tag "$DOCKER_IMAGE_NAME" "$CI_REGISTRY_IMAGE:$VERSION"
        docker push "$CI_REGISTRY_IMAGE:$VERSION"
      fi
  # Run this job in a branch where a Dockerfile exists
  rules:
    - if: $CI_COMMIT_BRANCH
      exists:
        - Dockerfile


deploy-job:
  stage: deployment
  needs:
    - docker-build-job
  image:
    name: alpine
    pull_policy: if-not-present
  before_script:
    - echo "Setting environment..."
    - apk add sshpass
    - apk add openssh-client
    - eval $(ssh-agent -s)
    - ssh-keygen -b 2048 -t rsa -f /root/.ssh/id_rsa -q -N ""
    - sshpass -p $SSH_PASSWORD ssh -o StrictHostKeyChecking=no $SSH_USER@$MACHINE_IP ls
    - sshpass -p $SSH_PASSWORD ssh-copy-id $SSH_USER@$MACHINE_IP
  script:
    - echo "Deploying application..."
    - ssh $SSH_USER@$MACHINE_IP 'docker kill chat || true'
    - ssh $SSH_USER@$MACHINE_IP 'docker rm chat || true'
    - ssh $SSH_USER@$MACHINE_IP 'docker run -d -p 0.0.0.0:8084:8084 --name chat --pull=always -e AES_KEY_BASE64="1G27fH7RxJmR7J2XeWZxXUpOB9qX9QF5qMu5N7jZqR0=" gitlab.services.ding.unisannio.it:5050/gruppo9/chat:1.0'
    - echo "Application successfully deployed."
