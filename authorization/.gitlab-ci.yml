workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'

variables:
  VERSION: "1.0"

stages:
  - test
  - package
  - docker-build
  - deployment

# ------------------- JOB DI TEST -------------------
test-job:
  stage: test
  image:
    name: maven:3.9.5-eclipse-temurin-21
  services:
    - name: mongo:6.0
      alias: mongodb
  script:
    - echo "Waiting for MongoDB to be ready..."
    - mvn clean test

  artifacts:
    when: always
    reports:
      junit: target/surefire-reports/*.xml
    paths:
      - target/surefire-reports/

# ------------------- PACKAGE -------------------
package-job:
  stage: package
  image:
    name: maven:3.9.5-eclipse-temurin-21
    pull_policy: if-not-present
  script:
    - mvn clean package -Dmaven.test.skip=true
  artifacts:
    paths:
      - target/*.jar

# ------------------- DOCKER BUILD -------------------
docker-build-job:
  stage: docker-build
  needs:
    - package-job
  variables:
    DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  image:
    name: docker
    pull_policy: if-not-present
  services:
    - name: docker:dind
      pull_policy: if-not-present
  before_script:
    - docker info
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker build --pull -t "$DOCKER_IMAGE_NAME" .
    - docker push "$DOCKER_IMAGE_NAME"
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        docker tag "$DOCKER_IMAGE_NAME" "$CI_REGISTRY_IMAGE:$VERSION"
        docker push "$CI_REGISTRY_IMAGE:$VERSION"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH
      exists:
        - Dockerfile

# ------------------- DEPLOY -------------------
deploy-job:
  stage: deployment
  needs:
    - docker-build-job
  image:
    name: alpine
    pull_policy: if-not-present
  before_script:
    - echo "Setting environment..."
    - apk add --no-cache sshpass openssh-client
    - eval $(ssh-agent -s)
    - ssh-keygen -b 2048 -t rsa -f /root/.ssh/id_rsa -q -N ""
    - sshpass -p $SSH_PASSWORD ssh -o StrictHostKeyChecking=no $SSH_USER@$MACHINE_IP ls
    - sshpass -p $SSH_PASSWORD ssh-copy-id $SSH_USER@$MACHINE_IP
  script:
    - echo "Deploying application..."
    - ssh $SSH_USER@$MACHINE_IP 'docker kill authorization || true'
    - ssh $SSH_USER@$MACHINE_IP 'docker rm authorization || true'
    - ssh $SSH_USER@$MACHINE_IP 'docker run -d -p 0.0.0.0:8081:8081 --name authorization --pull=always gitlab.services.ding.unisannio.it:5050/gruppo9/authorization:1.0'
    - echo "Application successfully deployed."

