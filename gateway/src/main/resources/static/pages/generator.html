<section id="generatorPage" class="page">
    <div class="column">
        <div class="card">
            <h3>Build Generator</h3>
            <form id="generatorFormInline">
                <div class="number-input">
                    <label for="budgetInline"></label><input type="number" id="budgetInline" placeholder="Budget €" min="0">
                    <button type="button" class="btn-dec">−</button>
                    <button type="button" class="btn-inc">+</button>
                </div>
                <button type="submit" class="btn"><div style="margin-bottom: 0"><span>Generate</span></div></button>
            </form>

            <ul class="list" id="generatedBuildInline"></ul>
            <button id="saveBuildBtnInline" style="display:none;" class="btn"><div style="margin: 0"><span>Save build</span></div></button>
        </div>
    </div>
</section>
