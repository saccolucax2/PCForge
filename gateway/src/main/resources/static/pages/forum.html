<section id="forumPage" class="page">
    <div class="column">
        <div class="card">
            <h3>Create Post</h3>
            <form id="postFormInline">
                <label for="postTitleInline"></label><input type="text" id="postTitleInline" placeholder="Title" required>
                <label for="postBodyInline"></label><textarea id="postBodyInline" placeholder="Write something..." rows="4"></textarea>
                <button type="submit" class="btn"><div><span>Submit</span></div></button>
            </form>
        </div>

        <div class="card">
            <h3>Posts</h3>
            <ul class="list" id="postsListInline" style="justify-items: center"></ul>
        </div>
    </div>
</section>
