<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <title>PCForge - Dashboard</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
</head>
<body class="dashboard">
<div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar" role="region">
        <div class="brand">
            <img src="img/logo.png" alt="logo" class="site-logo-small">
            <div>
                <h2 class="site-title" style="margin: 0">PCForge</h2>
            </div>
        </div>

        <ul class="menu" role="menu">
            <li data-page="profile" class="active">
                <i class="ph ph-user"></i>
                <span>Profile</span>
            </li>
            <li data-page="generator">
                <i class="ph ph-cpu"></i>
                <span>Build Generator</span>
            </li>
            <li data-page="comparator">
                <i class="ph ph-arrows-clockwise"></i>
                <span>Build Comparator</span>
            </li>
            <li data-page="forum">
                <i class="ph ph-chats"></i>
                <span>Forum</span>
            </li>
            <li data-page="chat">
                <i class="ph ph-headset"></i>
                <span>Chat</span>
            </li>
        </ul>

        <button id="logout" class="btn" onClick="Auth.logout()"><div style="margin-top: -10px"><span>Logout</span></div></button>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <div class="main-inner" id="main-inner">
            <!-- qui verranno inserite le pagine caricate con fetch -->
        </div>
    </main>
</div>

<script src="js/auth.js" defer></script>
<script src="js/dashboard.js" defer></script>

</body>
</html>
