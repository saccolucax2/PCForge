services:
  # ------------------------------------
  # 1. DATABASE
  # ------------------------------------
  
  mongodb:
    image: mongo:latest
    container_name: pcforge-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mysql:
    image: mysql:8.0
    container_name: pcforge-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root 
      MYSQL_DATABASE: pcforge
    volumes:
      - mysql_data:/var/lib/mysql

  # ------------------------------------
  # 2. MICROSERVIZI
  # ------------------------------------

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8086:8086"
    environment:
      - MONGO_ADDRESS=mongodb
      - MONGO_PORT=27017
    depends_on:
      - mongodb
      - authorization
      - chat
      - forum

  authorization:
    build: ./authorization
    container_name: authorization
    ports:
      - "8081:8081"
    environment:
      - MONGO_ADDRESS=mongodb
    depends_on:
      - mongodb

  reviews:
    build: ./reviews
    container_name: reviews
    ports:
      - "8082:8082"
    environment:
      - MONGO_ADDRESS=mongodb
    depends_on:
      - mongodb

  buildgenerator:
    build: ./buildgenerator
    container_name: buildgenerator
    ports:
      - "8083:8083"
    environment:
      - MYSQL_ADDRESS=mysql
      - MYSQL_PORT=3306
    depends_on:
      - mysql

  chat:
    build: ./chat
    container_name: chat
    ports:
      - "8084:8084"
    environment:
      - MONGO_ADDRESS=mongodb
    depends_on:
      - mongodb

  forum:
    build: ./forum
    container_name: forum
    ports:
      - "8085:8085"
    environment:
      - MONGO_ADDRESS=mongodb
    depends_on:
      - mongodb

volumes:
  mongo_data:
  mysql_data: